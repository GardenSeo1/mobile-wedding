<svg xmlns="http://www.w3.org/2000/svg" width="430" height="230" viewBox="0 0 430 230" role="img" aria-label="Separated wedding text and heart SVG overlay">
  <title>Separated wedding text and hearts overlay</title>
  <defs>
    <path id="heart" d="M0,-8 C-10,-21 -30,-12 -26,8 C-22,29 0,38 0,38 C0,38 22,29 26,8 C30,-12 10,-21 0,-8 Z"/>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="2" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale=".85"/>
    </filter>
  </defs>
  <g id="wedding-text" fill="none" stroke="#fffdf8" stroke-linecap="round" stroke-linejoin="round">
    <text x="31" y="126" font-family="Noteworthy, 'Segoe Script', 'Bradley Hand', 'Brush Script MT', cursive" font-size="78" font-weight="300" letter-spacing="-1" stroke-width="2.7" opacity=".9" transform="rotate(-3 31 126)">We're</text>
    <text x="171" y="111" font-family="Noteworthy, 'Segoe Script', 'Bradley Hand', 'Brush Script MT', cursive" font-size="65" font-weight="300" letter-spacing="-1" stroke-width="2.45" opacity=".86" transform="rotate(2 171 111)">getting</text>
    <text x="249" y="169" font-family="Noteworthy, 'Segoe Script', 'Bradley Hand', 'Brush Script MT', cursive" font-size="57" font-weight="300" letter-spacing=".2" stroke-width="2.6" opacity=".96" transform="rotate(-6 249 169)">Married</text>
  </g>
  <g id="hearts" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)">
    <g id="top-right-heart" transform="translate(374 39) rotate(13) scale(.42)">
      <use href="#heart" fill="#ff9da6" fill-opacity=".58" stroke="#ffc3ca" stroke-width="4"/>
      <use href="#heart" fill="none" stroke="#ffffff" stroke-opacity=".42" stroke-width="1.8" transform="translate(35 1) scale(.55)"/>
    </g>
    <g id="bottom-left-heart" transform="translate(25 173) rotate(-17) scale(.52)">
      <use href="#heart" fill="#ffc2cb" fill-opacity=".64" stroke="#ffffff" stroke-width="3.7"/>
      <path d="M-18 -2 C-8 -10 6 -8 12 4 C4 1 -5 2 -14 9" fill="none" stroke="#2d2d2d" stroke-opacity=".65" stroke-width="1.2"/>
      <path d="M-7 -11 C-1 -4 -1 10 -5 20" fill="none" stroke="#2d2d2d" stroke-opacity=".45" stroke-width="1"/>
      <path d="M5 -8 C11 0 11 12 6 25" fill="none" stroke="#2d2d2d" stroke-opacity=".35" stroke-width=".95"/>
    </g>
    <path id="bottom-left-small-heart" d="M48 165 C53 155 64 160 59 171 C56 178 49 182 49 182 C49 182 40 176 41 168 C42 161 47 160 48 165 Z" fill="none" stroke="#ffffff" stroke-opacity=".82" stroke-width="1.5"/>
  </g>
</svg>
