<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>관리자 - 웨딩 사진 관리</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .upload-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-input-label {
            display: block;
            padding: 20px;
            background: #f8f8f8;
            border: 2px dashed #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-input-label:hover {
            border-color: #ff69b4;
            background: #fff;
        }
        .upload-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
        }
        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-item .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        .gallery-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-item .delete-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .gallery-item:hover .delete-btn {
            opacity: 1;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .status-message.success {
            background: #d4edda;
            color: #155724;
        }
        .status-message.error {
            background: #f8d7da;
            color: #721c24;
        }
        .section-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tab-btn {
            padding: 12px 24px;
            background: white;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            color: #333;
        }
        .tab-btn.active {
            color: #764ba2;
            border-bottom-color: #764ba2;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .limit-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #856404;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎉 웨딩 사진 관리자 페이지</h1>

    <!-- 탭 메뉴 -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('main')">📸 메인 사진</button>
        <button class="tab-btn" onclick="switchTab('wedding')">💒 웨딩 사진</button>
    </div>

    <!-- 메인 사진 탭 -->
    <div id="main-tab" class="tab-content active">
        <div class="upload-section">
            <div class="section-title">메인 슬라이더 사진 업로드</div>
            <div class="limit-info">
                ⚠️ 메인 사진은 최대 5개까지 등록 가능합니다 (현재: <span id="mainPhotoCount">0</span>/5)
            </div>

            <div class="file-input-wrapper">
                <input type="file" id="mainFileInput" accept="image/*" multiple onchange="previewMainImages()" />
                <label class="file-input-label" for="mainFileInput">
                    <div style="font-size: 48px; margin-bottom: 10px;">📷</div>
                    <div>클릭하여 메인 사진을 선택하세요</div>
                    <div style="font-size: 14px; color: #999; margin-top: 5px;">여러 장 선택 가능 (최대 5개)</div>
                </label>
            </div>

            <div id="mainPreviewGrid" class="preview-grid"></div>

            <button class="upload-btn" onclick="uploadMainImages()" id="mainUploadBtn" disabled>
                업로드 하기
            </button>

            <div class="progress-bar" id="mainProgressBar">
                <div class="progress-bar-fill" id="mainProgressBarFill"></div>
            </div>

            <div class="status-message" id="mainStatusMessage"></div>
        </div>

        <div class="gallery-section">
            <div class="section-title">업로드된 메인 사진 목록</div>
            <div id="mainGallery" class="gallery-grid"></div>
        </div>
    </div>

    <!-- 웨딩 사진 탭 -->
    <div id="wedding-tab" class="tab-content">
        <div class="upload-section">
            <div class="section-title">웨딩 사진 업로드</div>

        <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept="image/*" multiple onchange="previewImages()" />
            <label class="file-input-label" for="fileInput">
                <div style="font-size: 48px; margin-bottom: 10px;">📷</div>
                <div>클릭하여 사진을 선택하세요</div>
                <div style="font-size: 14px; color: #999; margin-top: 5px;">여러 장 선택 가능</div>
            </label>
        </div>

        <div id="previewGrid" class="preview-grid"></div>

        <button class="upload-btn" onclick="uploadImages()" id="uploadBtn" disabled>
            업로드 하기
        </button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-bar-fill" id="progressBarFill"></div>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <div class="gallery-section">
        <div class="section-title">업로드된 웨딩 사진 목록</div>
        <div id="gallery" class="gallery-grid"></div>
    </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://fupncptwrevxjlanbnsc.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cG5jcHR3cmV2eGpsYW5ibnNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3OTg4ODYsImV4cCI6MjA4NzM3NDg4Nn0.cjkLp94xTl56r8Q4ahy4Zx192yvBULPjNX33XJCoHzI";

    const supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

    let selectedFiles = [];
    let selectedMainFiles = [];
    const MAX_MAIN_PHOTOS = 5;

    // 탭 전환
    function switchTab(tabName) {
        // 모든 탭 버튼 비활성화
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        // 모든 탭 콘텐츠 숨기기
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        // 선택한 탭 활성화
        event.target.classList.add('active');
        document.getElementById(tabName + '-tab').classList.add('active');

        // 해당 탭의 갤러리 로드
        if (tabName === 'main') {
            loadMainGallery();
        } else {
            loadGallery();
        }
    }

    function previewImages() {
        const fileInput = document.getElementById("fileInput");
        const files = Array.from(fileInput.files);
        selectedFiles = files;

        const previewGrid = document.getElementById("previewGrid");
        const uploadBtn = document.getElementById("uploadBtn");

        previewGrid.innerHTML = "";

        if (files.length === 0) {
            uploadBtn.disabled = true;
            return;
        }

        uploadBtn.disabled = false;

        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const previewItem = document.createElement("div");
                previewItem.className = "preview-item";
                previewItem.innerHTML = `
                    <img src="${e.target.result}" alt="Preview" />
                    <button class="remove-btn" onclick="removePreview(${index})">&times;</button>
                `;
                previewGrid.appendChild(previewItem);
            };
            reader.readAsDataURL(file);
        });
    }

    function removePreview(index) {
        selectedFiles.splice(index, 1);

        const dataTransfer = new DataTransfer();
        selectedFiles.forEach(file => dataTransfer.items.add(file));
        document.getElementById("fileInput").files = dataTransfer.files;

        previewImages();
    }

    // 메인 사진 미리보기
    async function previewMainImages() {
        const fileInput = document.getElementById("mainFileInput");
        const files = Array.from(fileInput.files);

        // 현재 업로드된 메인 사진 개수 확인
        const { data: currentPhotos } = await supabase
            .from("photos")
            .select("*")
            .eq("photo_type", "main");

        const currentCount = currentPhotos ? currentPhotos.length : 0;
        const availableSlots = MAX_MAIN_PHOTOS - currentCount;

        if (files.length > availableSlots) {
            showMainStatus(`최대 ${availableSlots}개까지만 추가할 수 있습니다. (현재 ${currentCount}/${MAX_MAIN_PHOTOS})`, "error");
            fileInput.value = "";
            return;
        }

        selectedMainFiles = files;

        const previewGrid = document.getElementById("mainPreviewGrid");
        const uploadBtn = document.getElementById("mainUploadBtn");

        previewGrid.innerHTML = "";

        if (files.length === 0) {
            uploadBtn.disabled = true;
            return;
        }

        uploadBtn.disabled = false;

        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const previewItem = document.createElement("div");
                previewItem.className = "preview-item";
                previewItem.innerHTML = `
                    <img src="${e.target.result}" alt="Preview" />
                    <button class="remove-btn" onclick="removeMainPreview(${index})">&times;</button>
                `;
                previewGrid.appendChild(previewItem);
            };
            reader.readAsDataURL(file);
        });
    }

    function removeMainPreview(index) {
        selectedMainFiles.splice(index, 1);

        const dataTransfer = new DataTransfer();
        selectedMainFiles.forEach(file => dataTransfer.items.add(file));
        document.getElementById("mainFileInput").files = dataTransfer.files;

        previewMainImages();
    }

    // 메인 사진 업로드
    async function uploadMainImages() {
        if (selectedMainFiles.length === 0) {
            showMainStatus("파일을 선택해주세요", "error");
            return;
        }

        const uploadBtn = document.getElementById("mainUploadBtn");
        const progressBar = document.getElementById("mainProgressBar");
        const progressBarFill = document.getElementById("mainProgressBarFill");

        uploadBtn.disabled = true;
        uploadBtn.textContent = "업로드 중...";
        progressBar.style.display = "block";

        let uploaded = 0;
        const total = selectedMainFiles.length;

        for (let i = 0; i < selectedMainFiles.length; i++) {
            const file = selectedMainFiles[i];
            const filePath = `main/${Date.now()}_${i}_${file.name}`;

            const { data, error } = await supabase.storage
                .from("wedding-photos")
                .upload(filePath, file);

            if (error) {
                console.error("업로드 실패:", error);
                continue;
            }

            const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/wedding-photos/${filePath}`;

            await supabase.from("photos").insert([
                {
                    image_url: imageUrl,
                    photo_type: 'main'
                }
            ]);

            uploaded++;
            const progress = (uploaded / total) * 100;
            progressBarFill.style.width = progress + "%";
        }

        uploadBtn.disabled = false;
        uploadBtn.textContent = "업로드 하기";
        progressBar.style.display = "none";
        progressBarFill.style.width = "0%";

        document.getElementById("mainFileInput").value = "";
        document.getElementById("mainPreviewGrid").innerHTML = "";
        selectedMainFiles = [];

        showMainStatus(`${uploaded}개 사진이 업로드되었습니다!`, "success");
        loadMainGallery();
    }

    function showMainStatus(message, type) {
        const statusMessage = document.getElementById("mainStatusMessage");
        statusMessage.textContent = message;
        statusMessage.className = `status-message ${type}`;
        statusMessage.style.display = "block";

        setTimeout(() => {
            statusMessage.style.display = "none";
        }, 3000);
    }

    // 메인 사진 갤러리 로드
    async function loadMainGallery() {
        const { data, error } = await supabase
            .from("photos")
            .select("*")
            .eq("photo_type", "main")
            .order("created_at", { ascending: false });

        const gallery = document.getElementById("mainGallery");
        const countSpan = document.getElementById("mainPhotoCount");

        gallery.innerHTML = "";

        if (!data || data.length === 0) {
            gallery.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">업로드된 메인 사진이 없습니다</p>';
            countSpan.textContent = "0";
            return;
        }

        countSpan.textContent = data.length;

        data.forEach(photo => {
            const galleryItem = document.createElement("div");
            galleryItem.className = "gallery-item";
            galleryItem.innerHTML = `
                <img src="${photo.image_url}" alt="Main Photo" />
                <button class="delete-btn" onclick="deleteMainPhoto(${photo.id}, '${photo.image_url}')">삭제</button>
            `;
            gallery.appendChild(galleryItem);
        });
    }

    async function deleteMainPhoto(id, imageUrl) {
        if (!confirm("이 메인 사진을 삭제하시겠습니까?")) return;

        const filePath = imageUrl.split("/wedding-photos/")[1];

        await supabase.storage
            .from("wedding-photos")
            .remove([filePath]);

        await supabase
            .from("photos")
            .delete()
            .eq("id", id);

        showMainStatus("사진이 삭제되었습니다", "success");
        loadMainGallery();
    }

    async function uploadImages() {
        if (selectedFiles.length === 0) {
            showStatus("파일을 선택해주세요", "error");
            return;
        }

        const uploadBtn = document.getElementById("uploadBtn");
        const progressBar = document.getElementById("progressBar");
        const progressBarFill = document.getElementById("progressBarFill");

        uploadBtn.disabled = true;
        uploadBtn.textContent = "업로드 중...";
        progressBar.style.display = "block";

        let uploaded = 0;
        const total = selectedFiles.length;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const filePath = `wedding/${Date.now()}_${i}_${file.name}`;

            const { data, error } = await supabase.storage
                .from("wedding-photos")
                .upload(filePath, file);

            if (error) {
                console.error("업로드 실패:", error);
                continue;
            }

            const imageUrl = `${SUPABASE_URL}/storage/v1/object/public/wedding-photos/${filePath}`;

            await supabase.from("photos").insert([
                {
                    image_url: imageUrl,
                    photo_type: 'admin'
                }
            ]);

            uploaded++;
            const progress = (uploaded / total) * 100;
            progressBarFill.style.width = progress + "%";
        }

        uploadBtn.disabled = false;
        uploadBtn.textContent = "업로드 하기";
        progressBar.style.display = "none";
        progressBarFill.style.width = "0%";

        document.getElementById("fileInput").value = "";
        document.getElementById("previewGrid").innerHTML = "";
        selectedFiles = [];

        showStatus(`${uploaded}개 사진이 업로드되었습니다!`, "success");
        loadGallery();
    }

    function showStatus(message, type) {
        const statusMessage = document.getElementById("statusMessage");
        statusMessage.textContent = message;
        statusMessage.className = `status-message ${type}`;
        statusMessage.style.display = "block";

        setTimeout(() => {
            statusMessage.style.display = "none";
        }, 3000);
    }

    async function loadGallery() {
        const { data, error } = await supabase
            .from("photos")
            .select("*")
            .eq("photo_type", "admin")
            .order("created_at", { ascending: false });

        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        if (!data || data.length === 0) {
            gallery.innerHTML = '<p style="text-align:center;color:#999;padding:40px;">업로드된 사진이 없습니다</p>';
            return;
        }

        data.forEach(photo => {
            const galleryItem = document.createElement("div");
            galleryItem.className = "gallery-item";
            galleryItem.innerHTML = `
                <img src="${photo.image_url}" alt="Wedding Photo" />
                <button class="delete-btn" onclick="deletePhoto(${photo.id}, '${photo.image_url}')">삭제</button>
            `;
            gallery.appendChild(galleryItem);
        });
    }

    async function deletePhoto(id, imageUrl) {
        if (!confirm("이 사진을 삭제하시겠습니까?")) return;

        const filePath = imageUrl.split("/wedding-photos/")[1];

        await supabase.storage
            .from("wedding-photos")
            .remove([filePath]);

        await supabase
            .from("photos")
            .delete()
            .eq("id", id);

        showStatus("사진이 삭제되었습니다", "success");
        loadGallery();
    }

    // 페이지 로드 시 실행
    loadGallery();
    loadMainGallery();
</script>
</body>
</html>
